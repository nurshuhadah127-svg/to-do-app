<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <title>Pretty To-Do App</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

<div class="header">
                <h1>My To-Do List ✨</h1>
                <p>Stay organized and be happy!</p>
            </div>

            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Enter a new task...">

                <input type="date" id="taskDate">

                <button onclick="addTask()">
                    
                    <i class="fa-solid fa-plus"></i>+ Add Task</button>
            </div>

            <ul id="taskList">

                <li>

                    <button class="delete-btn">Delete 🗑️</button>

                    <span class="task-text">Finished Assignment <span class="star-icon">☆</span></span>

                    <span class="task-date">📅 2024-06-30</span>

                    <div class="action-buttons">
                        <button class="edit-btn">Edit</button>
                        <button class="update-btn">Update</button>
                    </div>
                </li>

            </ul>

        </div>

        <script src="script.js"></script>
        
    </body>
</html>
